server:
  port: 8080

spring:
  application:
    name: edusphere-lms
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: jdbc:h2:mem:eduspheredb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=KEY,VALUE
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql

# JWT Configuration
app:
  jwt:
    secret: 9a2f982878144b62d3a3d5e27a6c90538a7c29e160e90c91350a8c2fdeee2d08a554a32c
    expiration-ms: 86400000 # 24 hours
