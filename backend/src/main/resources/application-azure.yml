spring:
  config:
    activate:
      on-profile: azure
  datasource:
  
    url: jdbc:sqlserver://${AZURE_SQL_SERVER_NAME}.database.windows.net:1433;databaseName=${AZURE_SQL_DATABASE_NAME};encrypt=true;trustServerCertificate=false;loginTimeout=30;

    username: ${AZURE_SQL_USERNAME}
    password: ${AZURE_SQL_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    database-platform: org.hibernate.dialect.SQLServer2016Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-mssql.sql

  cloud:
    azure:
      storage:
        blob:
          connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
          container-name: ${AZURE_STORAGE_CONTAINER:edusphere-media}

management:
  metrics:
    export:
      azuremonitor:
        instrumentation-key: ${AZURE_MONITOR_INSTRUMENTATION_KEY:mock-instrumentation-key}
